<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Design | Nail Art Specialist</title>
    <style>
        /* PALETA DE CORES E VARIÁVEIS */
        :root {
            --rosa-pastel: #fdf2f5;
            --rosa-medio: #f8bbd0;
            --rosa-escuro: #c2185b;
            --texto: #4a4a4a;
            --branco: #ffffff;
            --sombra: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* RESET E GERAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--rosa-pastel); color: var(--texto); line-height: 1.6; }

        /* HEADER & MENU */
        header {
            background: var(--branco);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--sombra);
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--rosa-escuro); }

        nav ul { display: flex; list-style: none; gap: 20px; align-items: center; }

        .nav-btn {
            background: var(--rosa-pastel);
            border: 1px solid var(--rosa-medio);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .nav-btn:hover { background: var(--rosa-escuro); color: white; transform: translateY(-3px); }

        /* LANDING PAGE (HERO) */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&q=80&w=1200') center/cover;
            padding: 20px;
        }

        .hero h1 { font-size: 3.5rem; color: var(--rosa-escuro); margin-bottom: 1rem; text-shadow: 2px 2px var(--branco); }

        .cta-btn {
            padding: 15px 40px;
            background: var(--rosa-escuro);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(194, 24, 91, 0.4);
            transition: 0.3s;
        }

        .cta-btn:hover { transform: scale(1.05); background: #a3154d; }

        /* CATÁLOGO E FILTROS */
        .catalog { padding: 50px 5%; max-width: 1200px; margin: 0 auto; }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 25px;
            border: 2px solid var(--rosa-escuro);
            background: white;
            color: var(--rosa-escuro);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover { background: var(--rosa-escuro); color: white; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--sombra);
            transition: 0.3s;
            border: 1px solid var(--rosa-pastel);
        }

        .card:hover { transform: translateY(-10px); }

        .card img { width: 100%; height: 200px; object-fit: cover; }

        .card-info { padding: 20px; }

        .card-info h3 { margin-bottom: 10px; color: var(--rosa-escuro); }

        .price { font-size: 1.2rem; font-weight: bold; color: #333; }

        /* MODAIS / INTERAÇÕES */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .close { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 1.5rem; }

        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--rosa-medio); border-radius: 5px; }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            nav ul { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; justify-content: space-around; }
            .hero h1 { font-size: 2.2rem; }
            .catalog { padding-bottom: 100px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Rose Design</div>
        <nav>
            <ul>
                <li><button class="nav-btn" onclick="openModal('modal-contato')">📞 Contato</button></li>
                <li><button class="nav-btn" onclick="openModal('modal-agenda')">📅 Agenda</button></li>
                <li><button class="nav-btn" onclick="openModal('modal-carrinho')">🛒 Carrinho</button></li>
                <li><button class="nav-btn" onclick="openModal('modal-perfil')">👤 Perfil</button></li>
            </ul>
        </nav>
    </header>
