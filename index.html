<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pérola Nails | Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-pastel: #f8c8dc;
            --rosa-escuro: #d4a5b9;
            --off-white: #fdf2f5;
            --texto: #4a4a4a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--off-white);
            color: var(--texto);
            text-align: center;
            padding: 20px;
        }

        /* Estilo do Botão Principal */
        .btn-servicos {
            background-color: var(--rosa-pastel);
            color: var(--texto);
            border: 2px solid var(--rosa-escuro);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 50px;
        }

        .btn-servicos:hover {
            background-color: var(--rosa-escuro);
            color: white;
            transform: scale(1.05);
        }

        /* Container da Tabela (Escondido por padrão) */
        #tabela-precos {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.6s ease-in-out;
            margin-top: 30px;
        }

        #tabela-precos.ativo {
            max-height: 2000px; /* Valor alto para permitir expansão */
            opacity: 1;
        }

        /* Grid de Serviços */
        .servicos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--rosa-pastel);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .info {
            padding: 15px;
        }

        .preco {
            display: block;
            font-size: 1.3rem;
            color: var(--rosa-escuro);
            font-weight: 600;
            margin-top: 10px;
        }

        h2 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Conheça nossos cuidados</h2>
    <p>Clique abaixo para ver as opções e valores.</p>

    <button class="btn-servicos" id="btnToggle">Nossos Serviços 💅</button>

    <div id="tabela-precos">
        <div class="servicos-grid" id="grid-container">
            </div>
    </div>

    <script>
        const servicos = [
            { nome: "Mão Simples", preco: "R$ 35,00", img: "https://images.unsplash.com/photo-1519014816548-bf5fe059798b?w=400" },
            { nome: "Pé e Mão", preco: "R$ 65,00", img: "https://images.unsplash.com/photo-1522337660859-02fbefca4702?w=400" },
            { nome: "Banho de Gel", preco: "R$ 90,00", img: "https://images.unsplash.com/photo-1632345031435-8727f6897d53?w=400" },
            { nome: "Esmaltação em Gel", preco: "R$ 55,00", img: "https://images.unsplash.com/photo-1604654894610-df490651e194?w=400" }
        ];

        const btn = document.getElementById('btnToggle');
        const tabela = document.getElementById('tabela-precos');
        const grid = document.getElementById('grid-container');

        // Criar os cards dinamicamente
        servicos.forEach(s => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${s.img}" alt="${s.nome}">
                    <div class="info">
                        <h3>${s.nome}</h3>
                        <span class="preco">${s.preco}</span>
                    </div>
                </div>
            `;
        });

        // Lógica do Clique para mostrar/esconder
        btn.addEventListener('click', () => {
            tabela.classList.toggle('ativo');
            
            if (tabela.classList.contains('ativo')) {
                btn.innerText = "Fechar Tabela ✕";
                // Scroll suave para a tabela
                setTimeout(() => {
                    tabela.scrollIntoView({ behavior: 'smooth' });
                }, 300);
            } else {
                btn.innerText = "Nossos Serviços 💅";
            }
        });
    </script>

</body>
</html>
